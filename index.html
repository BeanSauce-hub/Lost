<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Package Export</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip"></script>

<style>
body{
  margin:0;
  background:#f7f7f7;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
}

.container{
  max-width:640px;
  margin:120px auto;
  padding:40px;
  background:#fff;
  border:1px solid #e6e6e6;
  border-radius:8px;
}

h1{
  font-size:22px;
  font-weight:600;
  margin-bottom:30px;
}

.input{
  margin-bottom:16px;
}

input[type=file]{
  width:100%;
  padding:10px;
  border:1px solid #e6e6e6;
  border-radius:6px;
  background:#fafafa;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:1px solid #e6e6e6;
  background:#111;
  color:#fff;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.note{
  margin-top:16px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
<h1>Package Export</h1>

<div class="input">
<input type="file" id="f1">
</div>

<div class="input">
<input type="file" id="f2">
</div>

<button onclick="run()">Generate</button>

<div class="note">
Columns required: 责任机构 / 责任人 / 运单号
</div>

</div>

<script>

async function read(file){
  let wb=XLSX.read(await file.arrayBuffer());
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
}

function build(org,data){
  let rows=[[org,"","",data.length]];
  let m={};
  data.forEach(d=>{
    (m[d["责任人"]]??=[]).push(d["运单号"]);
  });

  for(let p in m){
    rows.push(["",p,"",m[p].length]);
    m[p].forEach(w=>rows.push(["","",w,1]));
  }

  let ws=XLSX.utils.aoa_to_sheet(rows);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Sheet1");

  return XLSX.write(wb,{type:"array",bookType:"xlsx"});
}

async function exportZip(rows,name){

  let zip=new JSZip();
  let g={};

  rows.forEach(r=>{
    let o=r["责任机构"];
    let p=r["责任人"];
    let w=r["运单号"];

    if(o&&p&&w){
      (g[o]??=[]).push({p,w});
    }
  });

  for(let o in g){

    let rows=g[o].map(x=>({"责任人":x.p,"运单号":x.w}));

    zip.file(
      o+"_"+name+".xlsx",
      build(o,rows)
    );
  }

  let blob=await zip.generateAsync({type:"blob"});

  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name+".zip";
  a.click();
}

async function run(){

  let r1=await read(f1.files[0]);
  let r2=await read(f2.files[0]);

  exportZip(r1,"Suspected lost packages");
  exportZip(r2,"Interruptions packages");
}

</script>

</body>
</html>
